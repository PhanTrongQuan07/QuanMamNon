<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ Sơ Cá Nhân</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

  body{
  background-image: url("https://i.gifer.com/7VE.gif");
  background-size: cover;
}

    body::before{
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .container{
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    .card{
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .avatar{
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      margin-bottom: 15px;
    }

    h1{
      font-size: 40px;
      font-family: Algerian;
      margin-bottom: 10px;
    }

    .bio{
      font-size: 18px;
      margin-bottom: 25px;
    }

    .section{
      margin-top: 30px;
      text-align: left;
    }

    .section h2{
      margin-bottom: 15px;
      color: #ffd6e0;
    }

    .social a{
      display: block;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.15);
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .social a:hover{
      background: rgba(255,255,255,0.3);
      transform: scale(1.03);
    }

    .music{
      background: rgba(255,255,255,0.15);
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    iframe{
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

  </style>
</head>

<body>
